<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Turn your goals into a bingo card. Earn real rewards when you complete a row." />
  <meta name="theme-color" content="#0c0c0c" />
  <meta property="og:title" content="Bingoals" />
  <meta property="og:description" content="Turn your goals into a game. Earn rewards for every line you complete." />
  <title>Bingoals</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0c0c0c; min-height: 100vh; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <script type="text/babel" data-presets="react">

const { useState, useEffect, useRef } = React;

const FREE_IDX = 12;
const STORAGE_KEY = "bingoals-v1";
const FOUR_CORNERS = [0,4,20,24];
const X_PAT = [0,6,12,18,24,4,8,16,20];
const BORDER = [0,1,2,3,4,5,9,10,14,15,19,20,21,22,23,24];

const EXAMPLE_GOALS = [
  "Run a 5K","Read 12 books","Learn to cook 5 new dishes",
  "Take a weekend road trip","Start a journal","Do 30 days of yoga",
  "Visit a national park","Learn a new skill","Declutter one room",
  "Host a dinner party","Go to a concert","Try a new sport",
  "Write a letter to someone","Learn 50 words in a new language","Do a digital detox weekend",
  "Visit a museum","Plant something and keep it alive","Watch a classic film series",
  "Take a photography walk","Volunteer for a day","Make a new friend",
  "Do a sunrise hike","Finish a creative project","Plan a trip abroad",
];
const EXAMPLE_REWARDS = {
  rowRewards:["Nice dinner out","Spa or massage","New book or album","Fun day trip","Fancy cocktails"],
  colRewards:["New outfit","Concert tickets","Cooking class","Weekend getaway","Tech treat"],
  bonusRewards:{fourCorners:"Fancy dinner",xPattern:"New watch",border:"Plan a trip",fullCard:"Dream purchase"},
};

const THEMES = {
  dark:  { bg:"#0c0c0c",surface:"#141414",border:"#222",text:"#f0ebe0",muted:"#666",dim:"#2a2a2a",accent:"#DAA520",accentBg:"#1c1400",accentBorder:"#5a4200",done:"#0d200d",doneBorder:"#2d6b2d",doneText:"#4caf50",freeBg:"linear-gradient(135deg,#2d2200,#3a2d00)",input:"#181818",inputBorder:"#2a2a2a",gold:"linear-gradient(90deg,#b8860b,#FFD700,#DAA520,#FFD700,#b8860b)",tabActiveFg:"#0c0c0c",reward:"#c8b97a" },
  light: { bg:"#f0ebe0",surface:"#ffffff",border:"#ddd4c0",text:"#1a1410",muted:"#999",dim:"#e8e0d0",accent:"#8B4513",accentBg:"#fdf0e0",accentBorder:"#d4a070",done:"#e8f5e9",doneBorder:"#4caf50",doneText:"#2e7d32",freeBg:"linear-gradient(135deg,#fdf0e0,#f5e0c8)",input:"#f8f4ec",inputBorder:"#ddd4c0",gold:"linear-gradient(90deg,#6b3410,#cd853f,#8B4513,#cd853f,#6b3410)",tabActiveFg:"#ffffff",reward:"#8B4513" },
  vivid: { bg:"#0a0015",surface:"#130025",border:"#2d0050",text:"#f0e8ff",muted:"#9070b0",dim:"#1a0030",accent:"#bf00ff",accentBg:"#1a0030",accentBorder:"#5a0090",done:"#001a10",doneBorder:"#00e676",doneText:"#69f0ae",freeBg:"linear-gradient(135deg,#1a0030,#2a0050)",input:"#130025",inputBorder:"#2d0050",gold:"linear-gradient(90deg,#7c00ff,#bf00ff,#ff00aa,#bf00ff,#7c00ff)",tabActiveFg:"#ffffff",reward:"#df80ff" },
};

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function makeLayout(){const idx=shuffle([...Array(24).keys()]);return[...idx.slice(0,12),-1,...idx.slice(12)];}
function rowOf(i){return Math.floor(i/5);}
function colOf(i){return i%5;}
function rowIdxs(r){return[0,1,2,3,4].map(c=>r*5+c);}
function colIdxs(c){return[0,1,2,3,4].map(r=>r*5+c);}
function enc(d){try{return btoa(unescape(encodeURIComponent(JSON.stringify(d))));}catch{return null;}}
function dec(s){try{return JSON.parse(decodeURIComponent(escape(atob(s))));}catch{return null;}}
function saveState(state){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch{}}
function loadState(){try{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):null;}catch{return null;}}
function goldText(T){return{background:T.gold,backgroundSize:"200% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"shimmer 3s linear infinite"};}

function Confetti({on}){
  if(!on)return null;
  return <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:1000,overflow:"hidden"}}>
    {Array.from({length:50},(_,i)=>(
      <div key={i} style={{position:"absolute",left:`${(i/50)*100}%`,top:"-12px",width:"9px",height:"9px",borderRadius:i%3===0?"50%":i%3===1?"0":"2px",background:["#FFD700","#FF6B6B","#4ECDC4","#96CEB4","#FFEAA7","#c084fc","#f97316"][i%7],animation:`fall ${1.1+(i%5)*0.28}s linear ${(i%9)*0.06}s forwards`,transform:`rotate(${(i*41)%360}deg)`}}/>
    ))}
  </div>;
}

function Toast({data,T}){
  if(!data)return null;
  return <div style={{position:"fixed",top:"16px",left:"50%",zIndex:900,background:`linear-gradient(135deg,${T.accentBg},${T.accentBg}dd)`,border:`2px solid ${T.accent}`,borderRadius:"14px",padding:"14px 24px",textAlign:"center",minWidth:"260px",maxWidth:"90vw",boxShadow:`0 8px 40px ${T.accent}55`,transform:"translateX(-50%)",animation:"toast-pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards"}}>
    <div style={{fontSize:"28px",marginBottom:"4px"}}>{data.emoji}</div>
    <div style={{...goldText(T),fontFamily:"'Playfair Display',serif",fontSize:"17px",fontWeight:700,marginBottom:"3px"}}>{data.label}</div>
    {data.reward&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:"11px",color:T.reward,letterSpacing:"0.04em"}}>🎁 {data.reward}</div>}
  </div>;
}

function UncheckSheet({goalText,onConfirm,onCancel,T}){
  if(!goalText)return null;
  return <div style={{position:"fixed",inset:0,zIndex:800,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onCancel}>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)"}}/>
    <div onClick={e=>e.stopPropagation()} style={{position:"relative",width:"100%",maxWidth:"600px",background:T.surface,borderTop:`1px solid ${T.border}`,borderRadius:"16px 16px 0 0",padding:"24px 20px 36px",animation:"slide-up 0.25s ease-out"}}>
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:T.muted,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"8px"}}>Uncheck goal?</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"16px",color:T.text,marginBottom:"20px",lineHeight:1.4}}>"{goalText}"</div>
      <div style={{display:"flex",gap:"10px"}}>
        <button onClick={onConfirm} style={{flex:1,padding:"13px",background:T.accent,color:T.tabActiveFg,border:"none",borderRadius:"8px",fontFamily:"'DM Mono',monospace",fontSize:"12px",letterSpacing:"0.08em",cursor:"pointer"}}>Yes, uncheck</button>
        <button onClick={onCancel} style={{flex:1,padding:"13px",background:T.dim,color:T.text,border:`1px solid ${T.border}`,borderRadius:"8px",fontFamily:"'DM Mono',monospace",fontSize:"12px",letterSpacing:"0.08em",cursor:"pointer"}}>Cancel</button>
      </div>
    </div>
  </div>;
}

function Onboarding({onDone,T}){
  const [slide,setSlide]=useState(0);
  const slides=[
    {emoji:"🎯",title:"Welcome to Bingoals",body:"Turn your goals into a game. Set up to 24 goals, arrange them on a bingo card, and earn rewards every time you complete a row, column, or pattern."},
    {emoji:"🏆",title:"Win Real Rewards",body:"Every line you complete unlocks a reward you actually want — a treat, experience, or purchase. You define them. You earn them."},
    {emoji:"📤",title:"Share Your Progress",body:"Share a link to your card with friends and family. They can cheer you on — and make their own."},
  ];
  const s=slides[slide];
  return <div className="screen" style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px",textAlign:"center"}}>
    <div style={{...goldText(T),fontFamily:"'Playfair Display',serif",fontSize:"52px",fontWeight:900,letterSpacing:"-0.02em",marginBottom:"40px"}}>BINGOALS</div>
    <div style={{fontSize:"56px",marginBottom:"20px"}}>{s.emoji}</div>
    <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"24px",fontWeight:700,color:T.text,marginBottom:"12px"}}>{s.title}</h2>
    <p style={{fontFamily:"'DM Mono',monospace",fontSize:"13px",color:T.muted,lineHeight:1.7,maxWidth:"320px",marginBottom:"40px"}}>{s.body}</p>
    <div style={{display:"flex",gap:"6px",marginBottom:"32px"}}>
      {slides.map((_,i)=><div key={i} style={{width:i===slide?24:6,height:6,borderRadius:3,background:i===slide?T.accent:T.dim,transition:"all 0.3s"}}/>)}
    </div>
    <button onClick={()=>slide<slides.length-1?setSlide(s=>s+1):onDone()} style={{background:T.accent,color:T.tabActiveFg,border:"none",borderRadius:"8px",padding:"14px 40px",fontFamily:"'DM Mono',monospace",fontSize:"13px",letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer",fontWeight:500}}>
      {slide<slides.length-1?"Next →":"Let's Go →"}
    </button>
    {slide===0&&<button onClick={onDone} style={{background:"transparent",border:"none",color:T.muted,fontFamily:"'DM Mono',monospace",fontSize:"11px",marginTop:"12px",cursor:"pointer",letterSpacing:"0.08em"}}>Skip intro</button>}
  </div>;
}

function Create({step,setStep,draft,setDraft,onLaunch,T}){
  const totalSteps=3;
  function updateGoal(i,v){setDraft(d=>{const g=[...d.goals];g[i]=v;return{...d,goals:g};});}
  function updateRowRew(i,v){setDraft(d=>{const r=[...d.rowRewards];r[i]=v;return{...d,rowRewards:r};});}
  function updateColRew(i,v){setDraft(d=>{const r=[...d.colRewards];r[i]=v;return{...d,colRewards:r};});}
  function updateBonus(k,v){setDraft(d=>({...d,bonusRewards:{...d.bonusRewards,[k]:v}}));}
  function loadExamples(){setDraft(d=>({...d,goals:[...EXAMPLE_GOALS],rowRewards:[...EXAMPLE_REWARDS.rowRewards],colRewards:[...EXAMPLE_REWARDS.colRewards],bonusRewards:{...EXAMPLE_REWARDS.bonusRewards}}));}
  function handleFocus(e){setTimeout(()=>e.target.scrollIntoView({behavior:"smooth",block:"center"}),300);}
  const filled=draft.goals.filter(g=>g.trim()).length;
  const canProceed=step===1?filled>=5:true;

  return <div className="screen" style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
    <div style={{padding:"20px 20px 0",display:"flex",alignItems:"center",gap:"12px"}}>
      {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{background:"transparent",border:"none",color:T.muted,cursor:"pointer",fontSize:"20px",padding:"4px",lineHeight:1,flexShrink:0}}>←</button>}
      <div style={{flex:1}}>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:T.muted,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:"4px"}}>Step {step+1} of {totalSteps}</div>
        <div style={{height:"3px",background:T.dim,borderRadius:"2px",overflow:"hidden"}}>
          <div style={{height:"100%",width:`${((step+1)/totalSteps)*100}%`,background:T.accent,borderRadius:"2px",transition:"width 0.4s ease"}}/>
        </div>
      </div>
    </div>

    <div style={{flex:1,overflowY:"auto",padding:"24px 20px 120px"}}>
      {step===0&&<div>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"26px",fontWeight:700,color:T.text,marginBottom:"8px"}}>Name your card</h2>
        <p style={{fontFamily:"'DM Mono',monospace",fontSize:"12px",color:T.muted,marginBottom:"28px",lineHeight:1.6}}>Give your bingo card a title and a label for the free centre space.</p>
        <label style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:T.muted,letterSpacing:"0.1em",textTransform:"uppercase",display:"block",marginBottom:"8px"}}>Card Title</label>
        <input type="text" value={draft.title} onChange={e=>setDraft(d=>({...d,title:e.target.value}))} onFocus={handleFocus} placeholder="e.g. 2026 Goals" maxLength={40}/>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:T.muted,marginTop:"6px",textAlign:"right"}}>{draft.title.length}/40</div>
        <div style={{marginTop:"24px"}}>
          <label style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:T.muted,letterSpacing:"0.1em",textTransform:"uppercase",display:"block",marginBottom:"8px"}}>Free Space Label</label>
          <input type="text" value={draft.freeLabel} onChange={e=>setDraft(d=>({...d,freeLabel:e.target.value}))} onFocus={handleFocus} placeholder="e.g. 2026" maxLength={12} style={{width:"160px"}}/>
        </div>
      </div>}

      {step===1&&<div>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"8px"}}>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"26px",fontWeight:700,color:T.text}}>Add your goals</h2>
          <button onClick={loadExamples} style={{background:T.dim,border:`1px solid ${T.border}`,color:T.muted,borderRadius:"6px",padding:"6px 10px",fontFamily:"'DM Mono',monospace",fontSize:"10px",cursor:"pointer",letterSpacing:"0.05em",flexShrink:0,marginTop:"4px"}}>Load examples</button>
        </div>
        <p style={{fontFamily:"'DM Mono',monospace",fontSize:"12px",color:T.muted,marginBottom:"6px",lineHeight:1.6}}>Add up to 24 goals. They'll be randomly placed on your card.</p>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:"11px",color:filled===24?T.accent:T.muted,marginBottom:"20px",transition:"color 0.3s"}}>{filled}/24 goals added {filled===24?"✓":""}</div>
        <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
          {draft.goals.map((g,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:"10px"}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:"11px",color:T.muted,width:"20px",textAlign:"right",flexShrink:0}}>{i+1}</div>
              <input type="text" value={g} onChange={e=>updateGoal(i,e.target.value)} onFocus={handleFocus} placeholder={`Goal ${i+1}`} maxLength={50} style={{borderColor:g.trim()?T.accentBorder:T.inputBorder}}/>
            </div>
          ))}
        </div>
      </div>}

      {step===2&&<div>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"26px",fontWeight:700,color:T.text,marginBottom:"8px"}}>Set your rewards</h2>
        <p style={{fontFamily:"'DM Mono',monospace",fontSize:"12px",color:T.muted,marginBottom:"24px",lineHeight:1.6}}>What do you earn for completing a row, column, or pattern?</p>
        {[{title:"Row Rewards →",items:draft.rowRewards,update:updateRowRew,labels:["Row 1","Row 2","Row 3","Row 4","Row 5"]},{title:"Column Rewards ↓",items:draft.colRewards,update:updateColRew,labels:["Col 1","Col 2","Col 3","Col 4","Col 5"]}].map(section=>(
          <div key={section.title} style={{marginBottom:"28px"}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:T.accent,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"12px",paddingBottom:"8px",borderBottom:`1px solid ${T.dim}`}}>{section.title}</div>
            {section.items.map((r,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:T.muted,width:"40px",flexShrink:0}}>{section.labels[i]}</div>
                <input type="text" value={r} onChange={e=>section.update(i,e.target.value)} onFocus={handleFocus} placeholder="e.g. Nice dinner" maxLength={50}/>
              </div>
            ))}
          </div>
        ))}
        <div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:T.accent,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"12px",paddingBottom:"8px",borderBottom:`1px solid ${T.dim}`}}>Bonus Pattern Rewards ✦</div>
          {[["fourCorners","🔲 4 Corners"],["xPattern","⌚ X Pattern"],["border","🧳 Border"],["fullCard","⛳ Full Card"]].map(([k,label])=>(
            <div key={k} style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:T.muted,width:"80px",flexShrink:0,lineHeight:1.3}}>{label}</div>
              <input type="text" value={draft.bonusRewards[k]} onChange={e=>updateBonus(k,e.target.value)} onFocus={handleFocus} placeholder="e.g. New golf clubs" maxLength={60}/>
            </div>
          ))}
        </div>
      </div>}
    </div>

    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"600px",padding:"16px 20px 32px",background:`linear-gradient(transparent,${T.bg} 35%)`}}>
      <button onClick={()=>step<totalSteps-1?setStep(s=>s+1):onLaunch()} disabled={!canProceed} style={{width:"100%",padding:"15px",background:T.accent,color:T.tabActiveFg,border:"none",borderRadius:"10px",fontFamily:"'DM Mono',monospace",fontSize:"13px",letterSpacing:"0.12em",textTransform:"uppercase",cursor:canProceed?"pointer":"not-allowed",opacity:canProceed?1:0.35,fontWeight:500,transition:"opacity 0.2s"}}>
        {step<totalSteps-1?"Continue →":"🚀 Launch My Card"}
      </button>
      {step===1&&!canProceed&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:T.muted,textAlign:"center",marginTop:"8px"}}>Add at least 5 goals to continue</div>}
    </div>
  </div>;
}

function CardView({card,checked,toggle,rowsWon,colsWon,T}){
  const [popped,setPopped]=useState(null);
  const [uncheckPending,setUncheckPending]=useState(null);
  function getGoal(pos){const gi=card.layout[pos];return gi===-1?(card.freeLabel||"FREE"):(card.goals[gi]||"");}
  function handleTap(idx){
    if(idx===FREE_IDX)return;
    if(checked[idx]){setUncheckPending({idx,goalText:getGoal(idx)});}
    else{setPopped(idx);setTimeout(()=>setPopped(null),300);toggle(idx);}
  }
  function confirmUncheck(){if(uncheckPending){toggle(uncheckPending.idx);setUncheckPending(null);}}
  function cellWon(i){return rowsWon.includes(rowOf(i))||colsWon.includes(colOf(i));}

  return <>
    <div style={{padding:"12px 10px 16px"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr) 30px",gap:"3px",marginBottom:"3px"}}>
        {card.colRewards.map((r,c)=>(
          <div key={c} style={{fontFamily:"'DM Mono',monospace",fontSize:"7px",letterSpacing:"0.03em",lineHeight:1.3,textAlign:"center",padding:"4px 2px",borderRadius:"4px",background:colsWon.includes(c)?T.accentBg:T.dim,border:`1px solid ${colsWon.includes(c)?T.accentBorder:T.border}`,color:colsWon.includes(c)?T.accent:T.muted,transition:"all 0.3s"}}>
            {colsWon.includes(c)?"▲ ":""}{r||"—"}
          </div>
        ))}
        <div/>
      </div>
      {[0,1,2,3,4].map(ri=>(
        <div key={ri} style={{display:"grid",gridTemplateColumns:"repeat(5,1fr) 30px",gap:"3px",marginBottom:"3px"}}>
          {[0,1,2,3,4].map(ci=>{
            const idx=ri*5+ci,free=idx===FREE_IDX,done=checked[idx],won=!free&&cellWon(idx),isPop=popped===idx;
            return <div key={idx} className={`goal-cell${won?" won":""}${isPop?" popped":""}`} onClick={()=>handleTap(idx)} style={{height:"70px",background:free?T.freeBg:done?T.done:T.surface,border:`${free?"2":"1"}px solid ${free?T.accent:done?T.doneBorder:T.border}`,borderRadius:"6px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"4px 3px",position:"relative",cursor:free?"default":"pointer"}}>
              {free?<div style={{textAlign:"center"}}><div style={{...goldText(T),fontFamily:"'Playfair Display',serif",fontSize:"16px",fontWeight:900,lineHeight:1}}>{card.freeLabel||"FREE"}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:"6px",color:T.muted,letterSpacing:"0.15em",marginTop:"2px"}}>FREE</div></div>
              :<>{done&&<div style={{position:"absolute",top:"3px",right:"4px",fontSize:"8px",color:T.doneText,fontWeight:"bold"}}>✓</div>}<div style={{fontFamily:"'DM Mono',monospace",fontSize:"clamp(6px,1.3vw,8px)",textAlign:"center",lineHeight:1.3,color:done?T.doneText:T.text,textDecoration:done?"line-through":"none",opacity:done?0.6:1,padding:"0 2px"}}>{getGoal(idx)}</div></>}
            </div>;
          })}
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Mono',monospace",fontSize:"6px",lineHeight:1.3,textAlign:"center",padding:"3px 2px",borderRadius:"4px",background:rowsWon.includes(ri)?T.accentBg:T.dim,border:`1px solid ${rowsWon.includes(ri)?T.accentBorder:T.border}`,color:rowsWon.includes(ri)?T.accent:T.muted,writingMode:"vertical-rl",width:"30px",letterSpacing:"0.03em",transition:"all 0.3s"}}>
            {rowsWon.includes(ri)?"✓ ":""}{card.rowRewards[ri]||"—"}
          </div>
        </div>
      ))}
    </div>
    <UncheckSheet goalText={uncheckPending?.goalText} onConfirm={confirmUncheck} onCancel={()=>setUncheckPending(null)} T={T}/>
  </>;
}

function RewardsView({card,rowsWon,colsWon,bonusWon,T}){
  const bonusData=[{key:"fourCorners",emoji:"🔲",label:"4 Corners",reward:card.bonusRewards.fourCorners},{key:"xPattern",emoji:"⌚",label:"X Pattern",reward:card.bonusRewards.xPattern},{key:"border",emoji:"🧳",label:"Border",reward:card.bonusRewards.border},{key:"fullCard",emoji:"⛳",label:"Full Card",reward:card.bonusRewards.fullCard}];
  function Item({emoji,label,reward,earned}){
    return <div style={{display:"flex",alignItems:"center",gap:"12px",background:earned?T.accentBg:T.surface,border:`${earned?"1.5":"1"}px solid ${earned?T.accentBorder:T.border}`,borderRadius:"10px",padding:"12px 14px",opacity:earned?1:0.45,transition:"all 0.3s",marginBottom:"6px"}}>
      <div style={{fontSize:"20px",flexShrink:0}}>{emoji}</div>
      <div style={{flex:1,minWidth:0}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:"14px",fontWeight:700,color:earned?T.accent:T.muted}}>{label}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:earned?T.reward:T.muted,marginTop:"2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{reward||"—"}</div></div>
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:"9px",color:earned?T.doneText:T.muted,letterSpacing:"0.08em",flexShrink:0}}>{earned?"✓ Earned":"Locked"}</div>
    </div>;
  }
  const totalEarned=rowsWon.length+colsWon.length+bonusWon.length;
  return <div style={{padding:"20px 16px 16px"}}>
    <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",fontWeight:700,color:T.text,marginBottom:"4px"}}>Your Rewards</h3>
    <p style={{fontFamily:"'DM Mono',monospace",fontSize:"11px",color:T.muted,marginBottom:"20px"}}>{totalEarned} of {5+5+4} rewards earned</p>
    <div style={{fontFamily:"'DM Mono',monospace",fontSize:"9px",color:T.muted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"8px"}}>Row Rewards</div>
    {card.rowRewards.map((r,i)=><Item key={i} emoji="🎯" label={`Row ${i+1}`} reward={r} earned={rowsWon.includes(i)}/>)}
    <div style={{fontFamily:"'DM Mono',monospace",fontSize:"9px",color:T.muted,letterSpacing:"0.12em",textTransform:"uppercase",margin:"16px 0 8px"}}>Column Rewards</div>
    {card.colRewards.map((r,i)=><Item key={i} emoji="🎯" label={`Column ${i+1}`} reward={r} earned={colsWon.includes(i)}/>)}
    <div style={{fontFamily:"'DM Mono',monospace",fontSize:"9px",color:T.muted,letterSpacing:"0.12em",textTransform:"uppercase",margin:"16px 0 8px"}}>Bonus Patterns</div>
    {bonusData.map(b=><Item key={b.key} emoji={b.emoji} label={b.label} reward={b.reward} earned={bonusWon.includes(b.key)}/>)}
  </div>;
}

function StatsView({card,checked,rowsWon,colsWon,bonusWon,T}){
  const done=checked.filter(Boolean).length-1;
  const total=card.goals.filter(g=>g.trim()).length;
  const pct=total>0?Math.round((done/total)*100):0;
  const rewardsEarned=rowsWon.length+colsWon.length+bonusWon.length;
  const created=new Date(card.createdAt);
  const now=new Date();
  const daysSince=Math.max(1,Math.floor((now-created)/(1000*60*60*24)));
  const pace=done/daysSince;
  const remaining=total-done;
  const daysToFinish=pace>0?Math.ceil(remaining/pace):null;
  const projectedDate=daysToFinish?new Date(now.getTime()+daysToFinish*86400000):null;
  function Stat({label,value,sub}){
    return <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:"10px",padding:"16px",flex:"1 1 140px"}}>
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:"9px",color:T.muted,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"6px"}}>{label}</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"28px",fontWeight:700,color:T.accent,lineHeight:1}}>{value}</div>
      {sub&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:T.muted,marginTop:"4px"}}>{sub}</div>}
    </div>;
  }
  return <div style={{padding:"20px 16px"}}>
    <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",fontWeight:700,color:T.text,marginBottom:"4px"}}>Progress</h3>
    <p style={{fontFamily:"'DM Mono',monospace",fontSize:"11px",color:T.muted,marginBottom:"20px"}}>Started {created.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</p>
    <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:"12px",padding:"20px",marginBottom:"16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:"11px",color:T.muted,letterSpacing:"0.08em",textTransform:"uppercase"}}>Goals Complete</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:"24px",fontWeight:700,color:T.accent}}>{done}<span style={{fontSize:"14px",color:T.muted,fontWeight:400}}> / {total}</span></div>
      </div>
      <div style={{height:"8px",background:T.dim,borderRadius:"4px",overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${T.accent}88,${T.accent})`,borderRadius:"4px",transition:"width 0.6s ease"}}/>
      </div>
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:T.muted,marginTop:"6px",textAlign:"right"}}>{pct}% complete</div>
    </div>
    <div style={{display:"flex",gap:"10px",flexWrap:"wrap",marginBottom:"10px"}}>
      <Stat label="Rewards Earned" value={rewardsEarned} sub={`of ${5+5+4} possible`}/>
      <Stat label="Days Active" value={daysSince} sub={`since ${created.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`}/>
    </div>
    <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
      <Stat label="Goals Left" value={remaining} sub="to complete card"/>
      {projectedDate&&pace>0&&<Stat label="Est. Finish" value={projectedDate.toLocaleDateString("en-US",{month:"short",year:"numeric"})} sub="at current pace"/>}
    </div>
    {done===0&&<div style={{background:T.accentBg,border:`1px dashed ${T.accentBorder}`,borderRadius:"10px",padding:"16px",marginTop:"16px",textAlign:"center"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:"11px",color:T.reward,lineHeight:1.6}}>Tap a square on your card to mark your first goal complete!</div></div>}
  </div>;
}

function SettingsView({card,setCard,setChecked,setRowsWon,setColsWon,setBonusWon,share,startOver,theme,setTheme,T}){
  const [confirmReset,setConfirmReset]=useState(false);
  const [confirmOver,setConfirmOver]=useState(false);
  const [editingTitle,setEditingTitle]=useState(false);
  const [titleDraft,setTitleDraft]=useState(card.title);
  function resetProgress(){const fresh=Array(25).fill(false);fresh[FREE_IDX]=true;setChecked(fresh);setRowsWon([]);setColsWon([]);setBonusWon([]);setConfirmReset(false);}
  function Section({title,children}){return <div style={{marginBottom:"24px"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:"9px",color:T.muted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"10px",paddingBottom:"8px",borderBottom:`1px solid ${T.dim}`}}>{title}</div>{children}</div>;}
  function Btn({label,emoji,onClick,danger}){return <button onClick={onClick} style={{display:"flex",alignItems:"center",gap:"10px",width:"100%",background:T.surface,border:`1px solid ${danger?T.accentBorder:T.border}`,color:danger?T.accent:T.text,borderRadius:"8px",padding:"13px 14px",fontFamily:"'DM Mono',monospace",fontSize:"12px",cursor:"pointer",marginBottom:"6px",textAlign:"left",transition:"all 0.15s"}}><span style={{fontSize:"16px"}}>{emoji}</span><span>{label}</span></button>;}
  function ConfirmBox({message,onYes,onNo,yesLabel="Yes"}){return <div style={{background:T.accentBg,border:`1px solid ${T.accentBorder}`,borderRadius:"8px",padding:"12px 14px",marginBottom:"6px"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:"11px",color:T.reward,marginBottom:"10px",lineHeight:1.5}}>{message}</div><div style={{display:"flex",gap:"8px"}}><button onClick={onYes} style={{flex:1,padding:"9px",background:T.accent,color:T.tabActiveFg,border:"none",borderRadius:"6px",fontFamily:"'DM Mono',monospace",fontSize:"11px",cursor:"pointer"}}>{yesLabel}</button><button onClick={onNo} style={{flex:1,padding:"9px",background:T.surface,color:T.text,border:`1px solid ${T.border}`,borderRadius:"6px",fontFamily:"'DM Mono',monospace",fontSize:"11px",cursor:"pointer"}}>Cancel</button></div></div>;}
  return <div style={{padding:"20px 16px"}}>
    <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",fontWeight:700,color:T.text,marginBottom:"20px"}}>Settings</h3>
    <Section title="Card">
      {editingTitle?<div style={{display:"flex",gap:"8px",marginBottom:"6px"}}><input type="text" value={titleDraft} onChange={e=>setTitleDraft(e.target.value)} maxLength={40} style={{borderColor:T.accent}}/><button onClick={()=>{setCard(c=>({...c,title:titleDraft}));setEditingTitle(false);}} style={{background:T.accent,color:T.tabActiveFg,border:"none",borderRadius:"6px",padding:"10px 14px",fontFamily:"'DM Mono',monospace",fontSize:"11px",cursor:"pointer",whiteSpace:"nowrap"}}>Save</button></div>
      :<Btn label={`Rename: "${card.title}"`} emoji="✏️" onClick={()=>setEditingTitle(true)}/>}
      <Btn label="Shuffle grid layout" emoji="🔀" onClick={()=>setCard(c=>({...c,layout:makeLayout()}))}/>
    </Section>
    <Section title="Theme">
      <div style={{display:"flex",gap:"8px"}}>
        {Object.entries({dark:"Dark",light:"Light",vivid:"Vivid"}).map(([k,label])=>(
          <button key={k} onClick={()=>setTheme(k)} style={{flex:1,padding:"10px 6px",border:`2px solid ${theme===k?T.accent:T.border}`,borderRadius:"8px",background:theme===k?T.accentBg:T.surface,color:theme===k?T.accent:T.muted,fontFamily:"'DM Mono',monospace",fontSize:"11px",cursor:"pointer",letterSpacing:"0.05em",transition:"all 0.2s"}}>{label}</button>
        ))}
      </div>
    </Section>
    <Section title="Share"><Btn label="Copy share link" emoji="📤" onClick={share}/></Section>
    <Section title="Danger Zone">
      {confirmReset?<ConfirmBox message="This will uncheck all your goals. Are you sure?" onYes={resetProgress} onNo={()=>setConfirmReset(false)} yesLabel="Yes, reset"/>:<Btn label="Reset progress" emoji="🔄" onClick={()=>setConfirmReset(true)} danger/>}
      {confirmOver?<ConfirmBox message="This will delete your card and all progress. Cannot be undone." onYes={startOver} onNo={()=>setConfirmOver(false)} yesLabel="Yes, delete"/>:<Btn label="Start over (new card)" emoji="🗑️" onClick={()=>setConfirmOver(true)} danger/>}
    </Section>
  </div>;
}

function ReadonlyView({data,onMakeOwn,T}){
  const {card,checked}=data;
  const done=checked.filter(Boolean).length-1;
  const total=card.goals.filter(g=>g.trim()).length;
  function getGoal(pos){const gi=card.layout[pos];return gi===-1?(card.freeLabel||"FREE"):(card.goals[gi]||"");}
  return <div style={{minHeight:"100vh",padding:"24px 12px 48px"}}>
    <div style={{textAlign:"center",marginBottom:"20px"}}>
      <div style={{...goldText(T),fontFamily:"'Playfair Display',serif",fontSize:"36px",fontWeight:900,letterSpacing:"-0.02em",marginBottom:"4px"}}>BINGOALS</div>
      <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",fontWeight:700,color:T.text,marginBottom:"4px"}}>{card.title}</h2>
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:"11px",color:T.muted}}>{done} of {total} goals complete</div>
    </div>
    <div style={{maxWidth:"400px",margin:"0 auto",padding:"10px 8px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:"12px"}}>
      {[0,1,2,3,4].map(ri=>(
        <div key={ri} style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"3px",marginBottom:"3px"}}>
          {[0,1,2,3,4].map(ci=>{const idx=ri*5+ci,free=idx===FREE_IDX,isDone=checked[idx];return <div key={idx} style={{height:"58px",background:free?T.freeBg:isDone?T.done:T.surface,border:`${free?"2":"1"}px solid ${free?T.accent:isDone?T.doneBorder:T.border}`,borderRadius:"5px",display:"flex",alignItems:"center",justifyContent:"center",padding:"3px"}}>{free?<div style={{...goldText(T),fontFamily:"'Playfair Display',serif",fontSize:"13px",fontWeight:900,textAlign:"center"}}>{card.freeLabel||"FREE"}</div>:<div style={{fontFamily:"'DM Mono',monospace",fontSize:"6px",textAlign:"center",lineHeight:1.3,color:isDone?T.doneText:T.muted,textDecoration:isDone?"line-through":"none",opacity:isDone?0.6:1}}>{isDone&&<span style={{display:"block",fontSize:"9px",color:T.doneText,marginBottom:"1px"}}>✓</span>}{getGoal(idx)}</div>}</div>;})}
        </div>
      ))}
    </div>
    <div style={{maxWidth:"400px",margin:"24px auto 0",background:T.accentBg,border:`1px solid ${T.accentBorder}`,borderRadius:"12px",padding:"24px 20px",textAlign:"center"}}>
      <div style={{...goldText(T),fontFamily:"'Playfair Display',serif",fontSize:"22px",fontWeight:700,marginBottom:"8px"}}>Make your own!</div>
      <p style={{fontFamily:"'DM Mono',monospace",fontSize:"11px",color:T.muted,marginBottom:"18px",lineHeight:1.7}}>Turn your own goals into a bingo card — and earn real rewards for completing them.</p>
      <button onClick={onMakeOwn} style={{background:T.accent,color:T.tabActiveFg,border:"none",borderRadius:"8px",padding:"13px 28px",fontFamily:"'DM Mono',monospace",fontSize:"12px",letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer"}}>Create My Card →</button>
    </div>
  </div>;
}

function App(){
  const [screen,setScreen]=useState("loading");
  const [createStep,setCreateStep]=useState(0);
  const [mainTab,setMainTab]=useState("card");
  const [theme,setTheme]=useState("dark");
  const T=THEMES[theme];
  const [card,setCard]=useState(null);
  const [checked,setChecked]=useState(()=>{const a=Array(25).fill(false);a[FREE_IDX]=true;return a;});
  const [rowsWon,setRowsWon]=useState([]);
  const [colsWon,setColsWon]=useState([]);
  const [bonusWon,setBonusWon]=useState([]);
  const [toast,setToast]=useState(null);
  const [confetti,setConfetti]=useState(false);
  const [readonlyData,setReadonlyData]=useState(null);
  const [draft,setDraft]=useState({title:"2026 Goals",freeLabel:"2026",goals:Array(24).fill(""),rowRewards:Array(5).fill(""),colRewards:Array(5).fill(""),bonusRewards:{fourCorners:"",xPattern:"",border:"",fullCard:""}});
  const toastRef=useRef(null);

  useEffect(()=>{
    const hash=window.location.hash.slice(1);
    if(hash){const decoded=dec(hash);if(decoded?.card){setReadonlyData(decoded);setTheme(decoded.theme||"dark");setScreen("readonly");return;}}
    const saved=loadState();
    if(saved?.card){setCard(saved.card);setChecked(saved.checked||Array(25).fill(false).map((_,i)=>i===FREE_IDX));setRowsWon(saved.rowsWon||[]);setColsWon(saved.colsWon||[]);setBonusWon(saved.bonusWon||[]);setTheme(saved.theme||"dark");setScreen("main");}
    else{setScreen("onboarding");}
  },[]);

  useEffect(()=>{if(screen==="main"&&card){saveState({card,checked,rowsWon,colsWon,bonusWon,theme});}},[checked,card,rowsWon,colsWon,bonusWon,theme]);

  function fire(data){if(toastRef.current)clearTimeout(toastRef.current);setToast(data);setConfetti(true);toastRef.current=setTimeout(()=>{setToast(null);setConfetti(false);},4000);}

  function toggle(idx){
    if(idx===FREE_IDX)return;
    setChecked(prev=>{
      const next=[...prev];next[idx]=!next[idx];
      if(next[idx]){
        const r=rowOf(idx),c=colOf(idx);
        if(!rowsWon.includes(r)&&rowIdxs(r).every(i=>next[i])){setRowsWon(w=>[...w,r]);fire({emoji:"🎯",label:`Row ${r+1} Complete!`,reward:card.rowRewards[r]});return next;}
        if(!colsWon.includes(c)&&colIdxs(c).every(i=>next[i])){setColsWon(w=>[...w,c]);fire({emoji:"🎯",label:`Column ${c+1} Complete!`,reward:card.colRewards[c]});return next;}
        if(!bonusWon.includes("fourCorners")&&FOUR_CORNERS.every(i=>next[i])){setBonusWon(w=>[...w,"fourCorners"]);fire({emoji:"🔲",label:"4 Corners!",reward:card.bonusRewards.fourCorners});return next;}
        if(!bonusWon.includes("xPattern")&&X_PAT.every(i=>next[i])){setBonusWon(w=>[...w,"xPattern"]);fire({emoji:"⌚",label:"X Pattern!",reward:card.bonusRewards.xPattern});return next;}
        if(!bonusWon.includes("border")&&BORDER.every(i=>next[i])){setBonusWon(w=>[...w,"border"]);fire({emoji:"🧳",label:"Border Complete!",reward:card.bonusRewards.border});return next;}
        const nf=[...Array(25).keys()].filter(i=>i!==FREE_IDX);
        if(!bonusWon.includes("fullCard")&&nf.every(i=>next[i])){setBonusWon(w=>[...w,"fullCard"]);fire({emoji:"⛳",label:"FULL CARD!",reward:card.bonusRewards.fullCard});return next;}
      }
      return next;
    });
  }

  function launchCard(){const newCard={...draft,createdAt:new Date().toISOString(),layout:makeLayout()};const fresh=Array(25).fill(false);fresh[FREE_IDX]=true;setCard(newCard);setChecked(fresh);setRowsWon([]);setColsWon([]);setBonusWon([]);setScreen("main");setMainTab("card");}

  function share(){
    const data={card,checked,rowsWon,colsWon,bonusWon,theme};
    const encoded=enc(data);
    if(encoded){
      const url=`${window.location.href.split("#")[0]}#${encoded}`;
      navigator.clipboard?.writeText(url).then(()=>fire({emoji:"📤",label:"Link Copied!",reward:"Share with a friend"})).catch(()=>fire({emoji:"📤",label:"Link Ready!",reward:"Copy it from your address bar"}));
    }
  }

  function startOver(){setCard(null);try{localStorage.removeItem(STORAGE_KEY);}catch{}setDraft({title:"2026 Goals",freeLabel:"2026",goals:Array(24).fill(""),rowRewards:Array(5).fill(""),colRewards:Array(5).fill(""),bonusRewards:{fourCorners:"",xPattern:"",border:"",fullCard:""}});setCreateStep(0);setScreen("onboarding");}

  const GLOBAL=`
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: ${T.bg}; }
    @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
    @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
    @keyframes toast-pop{0%{transform:translateX(-50%) scale(0.5);opacity:0}70%{transform:translateX(-50%) scale(1.07)}100%{transform:translateX(-50%) scale(1);opacity:1}}
    @keyframes fade-up{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes cell-pop{0%{transform:scale(1)}35%{transform:scale(1.14)}100%{transform:scale(1)}}
    @keyframes glow-pulse{0%,100%{box-shadow:0 0 4px ${T.accent}30}50%{box-shadow:0 0 14px ${T.accent}88}}
    @keyframes slide-up{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
    .screen{animation:fade-up 0.28s ease-out;}
    .goal-cell{transition:transform 0.1s,filter 0.15s,background 0.2s,border 0.2s;user-select:none;}
    .goal-cell:hover{transform:scale(1.04);filter:brightness(1.2);}
    .goal-cell:active{transform:scale(0.91);}
    .goal-cell.won{animation:glow-pulse 2s ease-in-out infinite;}
    .goal-cell.popped{animation:cell-pop 0.28s ease-out;}
    input[type=text]{background:${T.input};border:1px solid ${T.inputBorder};color:${T.text};font-family:'DM Mono',monospace;font-size:13px;border-radius:6px;padding:10px 12px;width:100%;outline:none;transition:border 0.2s;}
    input[type=text]:focus{border-color:${T.accent};}
    input[type=text]::placeholder{color:${T.muted};}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:${T.dim};border-radius:2px;}
  `;

  const TABS=[{key:"card",label:"Card",emoji:"🎯"},{key:"rewards",label:"Rewards",emoji:"🏆"},{key:"stats",label:"Stats",emoji:"📊"},{key:"settings",label:"More",emoji:"⚙️"}];
  const completedCount=checked.filter(Boolean).length-1;
  const totalGoals=card?card.goals.filter(g=>g.trim()).length:24;
  const progress=totalGoals>0?Math.round((completedCount/totalGoals)*100):0;

  if(screen==="loading")return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><style>{GLOBAL}</style><div style={{...goldText(T),fontFamily:"'Playfair Display',serif",fontSize:"32px",fontWeight:900}}>BINGOALS</div></div>;

  return <div style={{minHeight:"100vh",background:T.bg,color:T.text,maxWidth:"600px",margin:"0 auto",position:"relative",fontFamily:"Georgia,serif"}}>
    <style>{GLOBAL}</style>
    <Confetti on={confetti}/>
    <Toast data={toast} T={T}/>
    {screen==="onboarding"&&<Onboarding onDone={()=>{setScreen("create");setCreateStep(0);}} T={T}/>}
    {screen==="create"&&<Create step={createStep} setStep={setCreateStep} draft={draft} setDraft={setDraft} onLaunch={launchCard} T={T}/>}
    {screen==="readonly"&&readonlyData&&<ReadonlyView data={readonlyData} onMakeOwn={()=>setScreen("onboarding")} T={T}/>}
    {screen==="main"&&card&&<div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 16px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{...goldText(T),fontFamily:"'Playfair Display',serif",fontSize:"22px",fontWeight:900,letterSpacing:"-0.01em",lineHeight:1}}>{card.title}</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:T.muted,marginTop:"3px"}}>{completedCount}/{totalGoals} complete · {progress}%</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{height:"4px",width:"80px",background:T.dim,borderRadius:"2px",overflow:"hidden",marginBottom:"4px"}}><div style={{height:"100%",width:`${progress}%`,background:`linear-gradient(90deg,${T.accent}88,${T.accent})`,borderRadius:"2px",transition:"width 0.5s ease"}}/></div>
          <button onClick={share} style={{background:"transparent",border:`1px solid ${T.border}`,color:T.muted,borderRadius:"6px",padding:"4px 10px",fontFamily:"'DM Mono',monospace",fontSize:"9px",cursor:"pointer",letterSpacing:"0.05em"}}>share 📤</button>
        </div>
      </div>
      <div className="screen" style={{flex:1,overflowY:"auto",paddingBottom:"70px"}}>
        {mainTab==="card"&&<CardView card={card} checked={checked} toggle={toggle} rowsWon={rowsWon} colsWon={colsWon} T={T}/>}
        {mainTab==="rewards"&&<RewardsView card={card} rowsWon={rowsWon} colsWon={colsWon} bonusWon={bonusWon} T={T}/>}
        {mainTab==="stats"&&<StatsView card={card} checked={checked} rowsWon={rowsWon} colsWon={colsWon} bonusWon={bonusWon} T={T}/>}
        {mainTab==="settings"&&<SettingsView card={card} setCard={setCard} setChecked={setChecked} setRowsWon={setRowsWon} setColsWon={setColsWon} setBonusWon={setBonusWon} share={share} startOver={startOver} theme={theme} setTheme={setTheme} T={T}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"600px",background:T.surface,borderTop:`1px solid ${T.border}`,display:"flex",justifyContent:"space-around",padding:"8px 0 env(safe-area-inset-bottom, 8px)",zIndex:50}}>
        {TABS.map(tab=>(
          <button key={tab.key} onClick={()=>setMainTab(tab.key)} style={{background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",padding:"6px 16px",borderRadius:"8px",color:mainTab===tab.key?T.accent:T.muted,transition:"color 0.2s"}}>
            <span style={{fontSize:"18px"}}>{tab.emoji}</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:"9px",letterSpacing:"0.05em"}}>{tab.label}</span>
          </button>
        ))}
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</body>
</html>
